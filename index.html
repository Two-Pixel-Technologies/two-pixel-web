<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

    <link rel="manifest" href="/site.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Takai Labs builds custom software, web and mobile applications, AI-powered solutions, and business automation tools for growing companies." />
    <meta name="theme-color" content="#111827" />
    <title>Takai Labs | Custom Software & Digital Products</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore path encoded by 404.html (GitHub Pages SPA redirect trick)
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          params.delete('p');
          var qs = params.toString();
          window.history.replaceState(
            null, null,
            p + (qs ? '?' + qs : '') + window.location.hash
          );
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
