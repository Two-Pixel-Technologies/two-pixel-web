<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Takai Labs</title>
    <script>
      // GitHub Pages SPA redirect: encode the current path into a query string
      // and redirect to the root so index.html (and React Router) can handle it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/?p=' +
        encodeURIComponent(l.pathname + l.search) + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
